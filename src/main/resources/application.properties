# Database Configuration (MySQL)
# Uncomment the block below to use MySQL instead of H2
spring.datasource.url=jdbc:mysql://localhost:3306/exp6_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

